spring.application.name=monolith-service

# Eureka client configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# disable banner
spring.main.banner-mode=off

# root logging level trace.
logging.level.root=warn

# Log cho các custom filter và code của dự án
logging.level.com.alex.ecommerce=debug

# Log chi tiết các yêu cầu HTTP và Spring Data REST
logging.level.org.springframework.web=debug
logging.level.org.springframework.data.rest=debug

# sql statements logging
#logging.level.org.hibernate.SQL=debug
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace
#logging.level.org.hibernate.orm.jdbc.bind=TRACE

#logging.level.org.springframework.web=debug



# datasource configuration
spring.datasource.url=jdbc:mysql://localhost:3306/full-stack-ecommerce
spring.datasource.username=ecommerceapp
spring.datasource.password=ecommerceapp

spring.data.rest.base-path=/api

spring.data.rest.detection-strategy=ANNOTATED

allowed.origins=https://localhost,https://localhost:443

# Setting for Okta
#okta.oauth2.client-id=0oazbhtt9k78rgNqz697
