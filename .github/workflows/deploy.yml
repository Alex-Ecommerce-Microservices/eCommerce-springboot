name: CI for Monolith Service

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # BƯỚC QUAN TRỌNG 1: Cài đặt bộ giả lập để build ARM trên máy Intel
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # BƯỚC QUAN TRỌNG 2: Cài đặt Docker Buildx (công cụ build đa nền tảng)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .  # Build ngay tại thư mục gốc của repo này
          platforms: linux/amd64,linux/arm64 # Ép GitHub build cho cả 2 chip
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/monolith-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/monolith-service:v${{ github.run_number }}